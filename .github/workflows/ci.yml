name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore DotnetMcp.sln

      - name: Build
        run: dotnet build DotnetMcp.sln --no-restore -c Release

      - name: Test
        run: dotnet test DotnetMcp.sln --no-build -c Release -v n
